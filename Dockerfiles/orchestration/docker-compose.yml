version: '3.8'
services:
  # Database (External repository)
  # sqlserver:
  #   image: your-registry/database-repo:latest
  #   container_name: sqlserver-main
  #   environment:
  #     - SA_PASSWORD=${DB_SA_PASSWORD}
  #     - ACCEPT_EULA=Y
  #     - MSSQL_PID=Express
  #     - DB_NAME=${DB_NAME}
  #   volumes:
  #     # Host volumes for data persistence (modify paths as needed)
  #     - /opt/mssql/data:/var/opt/mssql/data
  #     - /opt/mssql/logs:/var/opt/mssql/log
  #     - /opt/mssql/backup:/var/opt/mssql/backup
  #   ports:
  #     - "1433:1433"
  #   networks:
  #     - main-network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P $SA_PASSWORD -Q 'SELECT 1' || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: redis-main
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6378:6378"
    volumes:
      # Host volume for Redis data persistence
      - /opt/redis/data:/data
    networks:
      - main-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Services
  LIMSService:
    image: 192.168.0.100:8071/enterprise/limsservice:${IMAGE_TAG}
    container_name: LIMSService-main
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Redis__ConnectionString=redis:6379
      - Redis__Password=${REDIS_PASSWORD}
    depends_on:
      # sqlserver:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main-network
    restart: unless-stopped

  BBMasterService:
    image: 192.168.0.100:8071/enterprise/bbmasterservice:${IMAGE_TAG}
    container_name: BBMasterService-main
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Redis__ConnectionString=redis:6379
      - Redis__Password=${REDIS_PASSWORD}
    depends_on:
      # sqlserver:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main-network
    restart: unless-stopped

  BBMgMtService:
    image: 192.168.0.100:8071/enterprise/bbmgmtservice:${IMAGE_TAG}
    container_name: BBMgMtService-main
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Redis__ConnectionString=redis:6379
      - Redis__Password=${REDIS_PASSWORD}
    depends_on:
      # sqlserver:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main-network
    restart: unless-stopped

  QC:
    image: 192.168.0.100:8071/enterprise/qcservice:${IMAGE_TAG}
    container_name: QC-main
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - Redis__ConnectionString=redis:6379
      - Redis__Password=${REDIS_PASSWORD}
    depends_on:
      # sqlserver:
      #   condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - main-network
    restart: unless-stopped

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    volumes:
      - ./nginx/api-gateway.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - LIMSService
      - BBMasterService
      - BBMgMtService
      - QC
    ports:
      - "8080:80"
    networks:
      - main-network
    restart: unless-stopped

  # Angular UI
  angular-ui:
    image: 192.168.0.100:8071/enterprise/angular:${IMAGE_TAG}
    container_name: angular-ui-main
    depends_on:
      - api-gateway
    ports:
      - "4200:80"
    networks:
      - main-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: nginx-main
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - angular-ui
      - api-gateway
    ports:
      - "80:80"
      - "443:443"
    networks:
      - main-network
    restart: unless-stopped

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-main
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./volumes/prometheus:/prometheus
    ports:
      - "9090:9090"
    networks:
      - main-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-main
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      # Host volume for Grafana data persistence
      - /opt/grafana/data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - main-network
    restart: unless-stopped

networks:
  main-network:
    driver: bridge
